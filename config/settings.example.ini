[postgres]
host = postgres
port = 5432
user = airflow
password = airflow
database = airflow

[paths]
raw_dir = /opt/airflow/data/raw
clean_dir = /opt/airflow/data/clean

[noaa]
bucket = noaa-isd-pds
prefix = isd-lite/data

[pipeline]
# files merged per COPY batch; lower if workers run out of memory
batch_size = 500
# minimum hourly readings required before a station/day is upserted
min_hourly_records = 4
